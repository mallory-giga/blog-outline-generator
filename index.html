<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giga Energy — Blog Outline Builder</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f9fafb; color: #111827; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    input, textarea, button { font-family: inherit; }

    .markdown h1 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
    .markdown h2 { font-size: 16px; font-weight: 700; margin: 18px 0 8px; }
    .markdown h3 { font-size: 14px; font-weight: 700; margin: 14px 0 6px; }
    .markdown ul { padding-left: 20px; margin-bottom: 8px; }
    .markdown li { font-size: 14px; line-height: 1.6; margin-bottom: 4px; }
    .markdown p { font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const BRAND = "#004EEB";

function App() {
  const [headline, setHeadline] = React.useState("");
  const [keyword, setKeyword] = React.useState("");
  const [cta, setCta] = React.useState("");
  const [context, setContext] = React.useState("");
  const [outline, setOutline] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState("");

  const isValid = headline && keyword && cta;

  const handleSubmit = async () => {
    if (!isValid) return;

    setLoading(true);
    setError("");
    setOutline("");

    try {
      const response = await fetch("/.netlify/functions/generate-outline", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ headline, keyword, cta, context }),
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || `Server error: ${response.status}`);
      }

      // ✅ NO STREAMING — Netlify-safe
      const text = await response.text();
      setOutline(text);

    } catch (err) {
      setError("Something went wrong: " + err.message);
    }

    setLoading(false);
  };

  return (
    <div style={{ padding: 40, maxWidth: 700, margin: "auto" }}>
      <h1 style={{ marginBottom: 20 }}>Blog Outline Builder</h1>

      <input
        placeholder="Headline"
        value={headline}
        onChange={e => setHeadline(e.target.value)}
        style={{ width: "100%", marginBottom: 10 }}
      />

      <input
        placeholder="Keyword"
        value={keyword}
        onChange={e => setKeyword(e.target.value)}
        style={{ width: "100%", marginBottom: 10 }}
      />

      <input
        placeholder="CTA"
        value={cta}
        onChange={e => setCta(e.target.value)}
        style={{ width: "100%", marginBottom: 10 }}
      />

      <textarea
        placeholder="Context (optional)"
        value={context}
        onChange={e => setContext(e.target.value)}
        style={{ width: "100%", marginBottom: 10 }}
      />

      <button
        onClick={handleSubmit}
        disabled={!isValid || loading}
        style={{
          padding: 10,
          background: BRAND,
          color: "white",
          border: "none",
          cursor: "pointer"
        }}
      >
        {loading ? "Generating..." : "Generate Outline"}
      </button>

      {error && <p style={{ color: "red" }}>{error}</p>}

      <div className="markdown" style={{ marginTop: 30, whiteSpace: "pre-wrap" }}>
        {outline}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
